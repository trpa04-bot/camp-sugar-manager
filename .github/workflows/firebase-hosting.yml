name: Firebase Hosting

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run analyzer
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build web app
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy_preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMP_SUGAR_MANAGER }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy PR preview to Firebase Hosting channel
        run: firebase hosting:channel:deploy pr-${{ github.event.number }} --expires 7d --project camp-sugar-manager

  deploy_live:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download web build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Normalize Google Cloud credentials
        id: gcp_credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CAMP_SUGAR_MANAGER }}
        run: |
          set -euo pipefail

          if printf '%s' "$FIREBASE_SERVICE_ACCOUNT" | jq -e . >/dev/null 2>&1; then
            credentials_json="$FIREBASE_SERVICE_ACCOUNT"
          else
            credentials_json="$(printf '%s' "$FIREBASE_SERVICE_ACCOUNT" | base64 --decode)"
            printf '%s' "$credentials_json" | jq -e . >/dev/null || {
              echo 'Error: Decoded credentials are not valid JSON' >&2
              exit 1
            }
          fi

          echo "::add-mask::$credentials_json"
          {
            echo 'credentials_json<<EOF'
            printf '%s\n' "$credentials_json"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ steps.gcp_credentials.outputs.credentials_json }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy live to Firebase Hosting
        run: firebase deploy --only hosting --project camp-sugar-manager